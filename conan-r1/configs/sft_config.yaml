model:
  base_model: "Qwen/Qwen2.5-VL-3B"
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05

training:
  lr: 5.0e-5
  batch_size: 16
  epochs: 10
  warmup_steps: 100
  weight_decay: 0.01
  max_grad_norm: 1.0
  save_steps: 500
  logging_steps: 50

data:
  data_dir: "data/surv_vau"
  split: "sft_train"
  num_frames: 25
  frame_size: 448
  max_new_tokens: 384

output:
  checkpoint_dir: "checkpoints/sft"
